name: Daily portfolio check

on:
  schedule:
    # 21:30 UTC ≈ just after US market close, Mon-Fri
    - cron: "30 21 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  daily-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Run daily check
        id: check
        run: python agent/daily_check.py report.md

      - name: Open alert issue
        if: steps.check.outputs.alerts_fired == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('report.md', 'utf8');
            const today = new Date().toISOString().slice(0, 10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[ALERT] Portfolio triggers fired — ${today}`,
              body,
              labels: ['portfolio-alert'],
            });
